name: Build installers

# Builds the Tapwijs desktop installers on real Windows and macOS runners,
# uploads them as downloadable artifacts AND publishes them to a GitHub Release
# (a clean public download page). Start it by hand from the Actions tab
# (Run workflow), or by pushing a tag like v0.1.0.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Needed so the workflow may create/update a Release with GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: tapwijs-windows
          - os: macos-latest
            target: mac
            artifact: tapwijs-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build installer
        run: npm run dist:${{ matrix.target }}
        env:
          # Skip code signing — produces an unsigned but working installer.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
          if-no-files-found: warn

      - name: Publish to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: Tapwijs 0.1.0
          body: |
            Installers voor Tapwijs. Download hieronder:
            - **macOS** (Apple Silicon): `Tapwijs-0.1.0.dmg`
            - **Windows**: `Tapwijs-Setup-0.1.0.exe`

            Eerste keer openen op Mac: rechtsklik op Tapwijs → Openen. Op Windows: "Meer informatie" → "Toch uitvoeren" (de installer is niet ondertekend).
          files: |
            dist/*.exe
            dist/*.dmg
          fail_on_unmatched_files: false
